version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: sms-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: schoolmanagement
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - sms-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Backend API
  backend:
    build:
      context: ../../server
      dockerfile: ../deploy/docker/backend/Dockerfile
    container_name: sms-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/schoolmanagement?authSource=admin
      JWT_SECRET: dev-secret-change-this-in-production-use-openssl-rand-hex-64
      JWT_EXPIRE: 7d
      CORS_ORIGIN: http://localhost
      CLOUDINARY_CLOUD_NAME: your-cloud-name
      CLOUDINARY_API_KEY: your-api-key
      CLOUDINARY_API_SECRET: your-api-secret
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
      LOG_LEVEL: debug
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - sms-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Application
  frontend:
    build:
      context: ../../client
      dockerfile: ../deploy/docker/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: sms-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - sms-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  sms-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
