apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      # - "first_rules.yml"
      # - "second_rules.yml"

    scrape_configs:
      # Prometheus itself
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # School Management System Backend
      - job_name: 'sms-backend'
        metrics_path: '/metrics'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - school-management
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: sms-backend
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            action: keep
            regex: 5000

      # School Management System Frontend (Nginx)
      - job_name: 'sms-frontend'
        metrics_path: '/'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - school-management
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: sms-frontend
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            action: keep
            regex: 80
