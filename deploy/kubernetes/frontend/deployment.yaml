apiVersion: apps/v1
kind: Deployment
metadata:
  name: sms-frontend
  namespace: school-management
  labels:
    app: sms-frontend
    tier: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sms-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: sms-frontend
        tier: web
    spec:
      containers:
        - name: frontend
          # TODO: Replace with your actual Docker Hub image
          image: your-dockerhub-username/school-mgmt-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
              protocol: TCP

          # Resource requests and limits
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

          # Readiness probe
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          # Liveness probe
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          # Container security context
          securityContext:
            runAsNonRoot: true
            runAsUser: 101  # nginx user
            allowPrivilegeEscalation: false

      # Pod-level security context
      securityContext:
        fsGroup: 101

      # Anti-affinity to spread pods across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - sms-frontend
                topologyKey: kubernetes.io/hostname

      # Image pull secrets (if using private Docker Hub repo)
      # imagePullSecrets:
      #   - name: dockerhub-credentials
