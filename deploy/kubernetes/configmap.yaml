apiVersion: v1
kind: ConfigMap
metadata:
  name: sms-config
  namespace: school-management
  labels:
    app: school-management-system
data:
  NODE_ENV: "production"
  PORT: "5000"

  # CORS Origin - Update this with your actual ALB URL after deployment
  # Format: comma-separated list of allowed origins
  CORS_ORIGIN: "http://localhost:3000"

  # JWT Expiration
  JWT_EXPIRE: "7d"

  # Rate Limiting
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX: "100"

  # Logging Level
  LOG_LEVEL: "info"
