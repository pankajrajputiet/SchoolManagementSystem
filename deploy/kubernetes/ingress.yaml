apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sms-ingress
  namespace: school-management
  labels:
    app: school-management-system
  annotations:
    # AWS ALB Ingress Controller annotations
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip

    # Listen on HTTP and HTTPS
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'

    # Redirect HTTP to HTTPS
    alb.ingress.kubernetes.io/ssl-redirect: "443"

    # SSL Certificate ARN (replace with your ACM certificate ARN)
    # Get your cert ARN from AWS ACM: aws acm list-certificates
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:YOUR_ACCOUNT_ID:certificate/YOUR_CERT_ID

    # Health check settings
    alb.ingress.kubernetes.io/healthcheck-path: /api/health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "10"
    alb.ingress.kubernetes.io/healthy-threshold-count: "3"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"

    # Idle timeout (seconds)
    alb.ingress.kubernetes.io/idle-timeout.timeout-seconds: "60"

    # Security group (optional - creates one automatically if not specified)
    # alb.ingress.kubernetes.io/security-groups: sg-xxxxxxxxx

spec:
  rules:
    # HTTP to HTTPS redirect is handled by annotations
    # All traffic goes to this ingress (no specific host)
    - http:
        paths:
          # API requests -> Backend service
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: sms-backend
                port:
                  number: 5000

          # All other requests -> Frontend service
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sms-frontend
                port:
                  number: 80

  # TLS configuration (optional if using ACM cert annotation above)
  # tls:
  #   - hosts:
  #       - your-domain.com
  #     secretName: sms-tls-secret
